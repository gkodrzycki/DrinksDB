<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover and search cocktail recipes for your home bar">
    <title>DrinksDB - Your Home Bar Companion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="container"
            style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;">
            <div>
                <h1>🍸 DrinksDB</h1>
                <p style="color: var(--text-secondary); font-size: 1.1rem;">Your Personal Home Bar Companion</p>
            </div>
            <button class="btn btn-secondary" id="addRecipeBtn">+ Add Recipe</button>
        </div>
    </header>

    <main class="container">
        <!-- Search and Filter Section -->
        <section class="filters-section">
            <h2 style="margin-bottom: var(--spacing-lg); color: var(--primary-light);">Find Your Perfect Drink</h2>

            <div class="filter-group">
                <label for="includeIngredients">Include Ingredients (comma-separated)</label>
                <input type="text" id="includeIngredients" placeholder="e.g., rum, lime, mint">
            </div>

            <div class="filter-group">
                <label for="excludeIngredients">Exclude Ingredients (comma-separated)</label>
                <input type="text" id="excludeIngredients" placeholder="e.g., whisky, tequila">
            </div>

            <div class="filter-group">
                <label for="alcoholTypes">Alcohol Type (comma-separated)</label>
                <input type="text" id="alcoholTypes" placeholder="e.g., vodka, gin">
            </div>

            <div class="filter-group">
                <label for="flavors">Flavors (comma-separated)</label>
                <input type="text" id="flavors" placeholder="e.g., sweet, sour, fruity">
            </div>

            <div class="filter-group">
                <label for="category">Category</label>
                <input type="text" id="category" placeholder="e.g., Cocktail, Mocktail, Shot">
            </div>

            <div class="button-group">
                <button class="btn btn-primary" id="searchBtn">Search Drinks</button>
                <button class="btn btn-secondary" id="randomBtn">Get Random Drink</button>
                <button class="btn btn-primary" id="clearBtn" style="opacity: 0.7;">Clear Filters</button>
            </div>
        </section>

        <!-- Drinks Display Section -->
        <section id="drinksSection">
            <div id="drinksContainer" class="drinks-grid"></div>
            <div id="loadMoreContainer" class="load-more-container"
                style="display: none; text-align: center; margin-top: 2rem; color: var(--text-secondary);">
                Loading more drinks...
            </div>
        </section>
    </main>

    <!-- Drink Detail Modal -->
    <div id="drinkModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content will be inserted here -->
            </div>
        </div>
    </div>

    <!-- Add Recipe Modal -->
    <div id="addRecipeModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeAddRecipeModal">&times;</span>
            <div class="modal-body">
                <h2 style="margin-bottom: var(--spacing-lg); color: var(--primary-light);">Add New Recipe</h2>
                <form id="addRecipeForm">
                    <div class="filter-group">
                        <label for="newDrinkId">Drink ID (unique, lowercase w/ dashes)</label>
                        <input type="text" id="newDrinkId" placeholder="e.g. custom-mojito" required>
                    </div>
                    <div class="filter-group">
                        <label for="newDrinkName">Name</label>
                        <input type="text" id="newDrinkName" placeholder="e.g. Custom Mojito" required>
                    </div>
                    <div class="filter-group">
                        <label for="newDrinkCategory">Category</label>
                        <input type="text" id="newDrinkCategory" placeholder="e.g. Cocktail" required>
                    </div>

                    <div class="filter-group">
                        <label>Ingredients</label>
                        <div id="newIngredientsList" style="margin-bottom: var(--spacing-sm);"></div>
                        <div style="display: flex; gap: var(--spacing-sm); position: relative;">
                            <input type="text" id="ingredientInput" placeholder="e.g. 2 oz Dark Rum">
                            <button type="button" class="btn btn-secondary" id="addIngredientBtn">Add</button>
                        </div>
                    </div>

                    <div class="filter-group">
                        <label>Instructions</label>
                        <div id="newInstructionsList" style="margin-bottom: var(--spacing-sm);"></div>
                        <div style="display: flex; gap: var(--spacing-sm);">
                            <input type="text" id="instructionInput" placeholder="e.g. Shake with ice">
                            <button type="button" class="btn btn-secondary" id="addInstructionBtn">Add</button>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; margin-top: var(--spacing-lg);">Save Recipe</button>
                </form>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
