<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Discover and search cocktail recipes for your home bar">
    <title>DrinksDB - Your Home Bar Companion</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <div class="container">
            <h1>🍸 DrinksDB</h1>
            <p style="color: var(--text-secondary); font-size: 1.1rem;">Your Personal Home Bar Companion</p>
        </div>
    </header>

    <main class="container">
        <!-- Search and Filter Section -->
        <section class="filters-section">
            <h2 style="margin-bottom: var(--spacing-lg); color: var(--primary-light);">Find Your Perfect Drink</h2>

            <div class="filter-group">
                <label for="includeIngredients">Include Ingredients (comma-separated)</label>
                <input type="text" id="includeIngredients" placeholder="e.g., rum, lime, mint">
            </div>

            <div class="filter-group">
                <label for="excludeIngredients">Exclude Ingredients (comma-separated)</label>
                <input type="text" id="excludeIngredients" placeholder="e.g., whisky, tequila">
            </div>

            <div class="filter-group">
                <label for="alcoholTypes">Alcohol Type (comma-separated)</label>
                <input type="text" id="alcoholTypes" placeholder="e.g., vodka, gin">
            </div>

            <div class="filter-group">
                <label for="flavors">Flavors (comma-separated)</label>
                <input type="text" id="flavors" placeholder="e.g., sweet, sour, fruity">
            </div>

            <div class="filter-group">
                <label for="category">Category</label>
                <input type="text" id="category" placeholder="e.g., Cocktail, Mocktail, Shot">
            </div>

            <div class="button-group">
                <button class="btn btn-primary" id="searchBtn">Search Drinks</button>
                <button class="btn btn-secondary" id="randomBtn">Get Random Drink</button>
                <button class="btn btn-primary" id="clearBtn" style="opacity: 0.7;">Clear Filters</button>
            </div>
        </section>

        <!-- Drinks Display Section -->
        <section id="drinksSection">
            <div id="drinksContainer" class="drinks-grid"></div>
        </section>
    </main>

    <!-- Drink Detail Modal -->
    <div id="drinkModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" id="closeModal">&times;</span>
            <div class="modal-body" id="modalBody">
                <!-- Dynamic content will be inserted here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
